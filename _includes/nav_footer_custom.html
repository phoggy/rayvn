<button class="theme-toggle btn" onclick="window._rayvnToggle()">☀️ Light</button>

<script>
(function () {
  var KEY = 'rayvn-color-scheme';

  function _darkLink()  { return document.querySelector('link[href*="just-the-docs-default.css"]'); }
  function _lightLink() { return document.getElementById('jtd-light-stylesheet'); }
  function _isLight()   { var l = _lightLink(); return l && l.media !== 'not all'; }

  window._rayvnSync = function () {
    var isLight = _isLight();
    document.querySelectorAll('.theme-toggle').forEach(function (b) {
      b.textContent = isLight ? '🌙 Dark' : '☀️ Light';
    });
  };

  window._rayvnToggle = function () {
    var goLight = !_isLight();
    var dark = _darkLink(), light = _lightLink();
    if (dark)  dark.media  = goLight ? 'not all' : '';
    if (light) light.media = goLight ? ''         : 'not all';
    localStorage.setItem(KEY, goLight ? 'light' : 'dark');
    window._rayvnSync();
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window._rayvnSync);
  } else {
    window._rayvnSync();
  }
})();
</script>
