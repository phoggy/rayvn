<button class="theme-toggle btn" onclick="window._rayvnToggle()">☀️ Light</button>

<script>
(function () {
  var KEY = 'rayvn-color-scheme';

  function _themeLink() {
    return document.querySelector('link[href*="just-the-docs-"]');
  }

  window._rayvnSync = function () {
    var link = _themeLink();
    var isLight = link && /just-the-docs-light\.css/.test(link.getAttribute('href'));
    document.querySelectorAll('.theme-toggle').forEach(function (b) {
      b.textContent = isLight ? '🌙 Dark' : '☀️ Light';
    });
  };

  window._rayvnToggle = function () {
    var link = _themeLink();
    if (!link) return;
    var href = link.getAttribute('href');
    var goLight = !/just-the-docs-light\.css/.test(href);
    link.setAttribute('href', goLight
      ? href.replace(/just-the-docs-\w+\.css/, 'just-the-docs-light.css')
      : href.replace('just-the-docs-light.css', 'just-the-docs-default.css'));
    localStorage.setItem(KEY, goLight ? 'light' : 'dark');
    window._rayvnSync();
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window._rayvnSync);
  } else {
    window._rayvnSync();
  }
})();
</script>
