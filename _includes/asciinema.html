<div id="asciinema-{{ include.id }}"></div>
<script>
  AsciinemaPlayer.create(
    '{{ include.src }}',
    document.getElementById('asciinema-{{ include.id }}'),
    {
      {% if include.cols %}cols: {{ include.cols }},{% endif %}
      {% if include.rows %}rows: {{ include.rows }},{% endif %}
      autoPlay: {{ include.autoplay | default: false }},
      theme: '{{ include.theme | default: "asciinema" }}'
    }
  );
</script>
